name: nice_rice
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  fluttertoast: ^8.2.6
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_analytics: ^11.2.1
  google_fonts: ^6.2.1
  video_player: ^2.10.0
  fl_chart: ^0.68.0
  pdf: ^3.10.7
  printing: ^5.13.4
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/1.png
    - assets/images/2.png
    - assets/images/3.png
    - assets/videos/splash.mp4
    - assets/images/google.png
    - assets/images/pon.png
